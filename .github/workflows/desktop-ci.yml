name: Desktop CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/greyboard-desktop/**'
      - 'packages/**'
      - 'tooling/**'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/greyboard-desktop/**'
      - 'packages/**'
      - 'tooling/**'
      - 'pnpm-lock.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @feel-good/greyboard-desktop lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Type check renderer
        run: pnpm --filter @feel-good/greyboard-desktop check-types

      - name: Type check electron
        run: pnpm --filter @feel-good/greyboard-desktop exec tsc --noEmit -p tsconfig.node.json

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @feel-good/greyboard-desktop build

      - name: Verify build output
        run: |
          test -f apps/greyboard-desktop/dist/index.html
          test -f apps/greyboard-desktop/dist-electron/main.cjs
          test -f apps/greyboard-desktop/dist-electron/preload.cjs
