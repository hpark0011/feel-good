appId: com.feelgood.greyboard-desktop
productName: Greyboard Desktop
copyright: Copyright © 2026 Feel Good

directories:
  output: release/

files:
  - dist/**
  - dist-electron/**

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.productivity
  icon: resources/icon.icns

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

dmg:
  writeUpdateInfo: true

publish:
  provider: github
  owner: feel-good
  repo: feel-good
